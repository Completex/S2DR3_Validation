<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados S2DR3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; margin: 0; }
    header { padding: 15px; background: #1e293b; color: white; }
    select { margin: 5px; padding: 5px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
    img { width: 100%; border-radius: 8px; }
    #map { height: 300px; }
  </style>
</head>

<body>

<header>
  <h1>Resultados S2DR3</h1>

  <select id="imagen"></select>
  <select id="tipo">
    <option value="S2">S2 vs S2DR3</option>
    <option value="PS">PS vs S2DR3</option>
  </select>
  <select id="banda"></select>
  <select id="stat_type">
    <option value="R">R</option>
    <option value="R2">R2</option>
    <option value="RMSE">RMSE</option>
    <option value="MAE">MAE</option>
    <option value="umbral">Umbral</option>
  </select>
</header>

<div class="grid">
  <div>
    <h3>Mapa</h3>
    <div id="map"></div>
  </div>

  <div>
    <h3>Referencia</h3>
    <img id="ref">
  </div>

  <div>
    <h3>Resultados</h3>
    <img id="stats_img">
  </div>

  <div>
    <h3>Hexbin</h3>
    <img id="hex">
  </div>

  <div>
    <h3>Error</h3>
    <img id="error">
  </div>

  <div>
    <h3>Plot</h3>
    <iframe id="plot" width="100%" height="300"></iframe>
  </div>
</div>

<script>
let catalogo = [];
let map, marker;

const selImg = document.getElementById("imagen");
const selTipo = document.getElementById("tipo");
const selBanda = document.getElementById("banda");
const selStat = document.getElementById("stat_type");

function initMap() {
  map = L.map('map').setView([-35, -71], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function fillImageSelect() {
  selImg.innerHTML = "";
  catalogo.forEach((item, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = item.id;
    selImg.appendChild(opt);
  });
}

function fillBandSelect() {
  const scene = catalogo[selImg.value];
  selBanda.innerHTML = "";

  Object.keys(scene.bands).forEach(b => {
    const opt = document.createElement("option");
    opt.value = b;
    opt.textContent = b;
    selBanda.appendChild(opt);
  });
}

function updateUI() {
  const scene = catalogo[selImg.value];
  const band = selBanda.value;
  const type = selTipo.value;
  const metric = selStat.value;

  const data = scene.bands[band][type];

  document.getElementById("ref").src = scene.reference;
  document.getElementById("stats_img").src = data.stats[metric];
  document.getElementById("hex").src = data.hex;
  document.getElementById("error").src = data.error;
  document.getElementById("plot").src = data.plot;

  if (marker) map.removeLayer(marker);
  marker = L.marker([scene.lat, scene.lon]).addTo(map);
  map.setView([scene.lat, scene.lon], 8);
}

function initApp(data) {
  catalogo = data;
  initMap();
  fillImageSelect();
  fillBandSelect();
  updateUI();

  selImg.onchange = () => { fillBandSelect(); updateUI(); };
  selTipo.onchange = updateUI;
  selBanda.onchange = updateUI;
  selStat.onchange = updateUI;
}

// 🔥 CARGA SEGURA (sin romper si falla)
fetch("./catalogo_final.json")
  .then(r => {
    if (!r.ok) throw new Error("No JSON");
    return r.json();
  })
  .then(data => initApp(data))
  .catch(err => {
    console.error("Error cargando JSON:", err);
  });
</script>

</body>
</html>

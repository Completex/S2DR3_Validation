<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: white;
  color: #111;
}

/* HEADER */
.header {
  padding: 15px;
  background: #e5e7eb;
  display: flex;
  gap: 10px;
  align-items: center;
}

/* GRID SUPERIOR */
.top {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

/* CARDS */
.card {
  background: #f3f4f6;
  border-radius: 12px;
  padding: 10px;
}

/* MAPA */
#map {
  height: 300px;
}

/* REF */
#ref {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* STATS */
#stats_img {
  width: 100%;
  height: 260px;
  object-fit: contain;
}

/* GRAFICOS */
.graficos {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}

.graficos img, iframe {
  width: 100%;
  height: 250px;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  padding-top: 50px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
}

.modal img, .modal iframe {
  margin: auto;
  display: block;
  width: 80%;
  height: 80%;
}

.modal:hover {
  cursor: zoom-out;
}
</style>
</head>

<body>

<div class="header">
  <h3>Interfaz de resultados</h3>

  <select id="imagen"></select>

  <select id="tipo">
    <option value="S2">S2 vs S2DR3</option>
    <option value="PS">PS vs S2DR3</option>
  </select>

  <select id="banda"></select>
</div>

<div class="top">

  <div class="card">
    <div id="map"></div>
  </div>

  <div class="card">
    <img id="ref">
  </div>

  <div class="card">
    <select id="stat_type">
      <option value="MAE">MAE</option>
      <option value="R">R</option>
      <option value="R2">R2</option>
      <option value="RMSE">RMSE</option>
      <option value="umbral">Umbral</option>
    </select>
    <img id="stats_img">
  </div>

</div>

<div class="graficos">
  <img id="hex">
  <img id="error">
  <iframe id="plot"></iframe>
</div>

<div id="modal" class="modal"></div>

<script>

let catalogo, map;

fetch("catalogo_final.json")
.then(r => r.json())
.then(data => {
  catalogo = data;
  init();
});

function init(){

  map = L.map('map').setView([-35,-71],5);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const selImg = document.getElementById("imagen");

  catalogo.imagenes.forEach(img => {

    let marker = L.marker([img.lat, img.lon]).addTo(map);

    marker.on("click", ()=>{
      selImg.value = img.id;
      cargarBandas();
      update();
    });

    let o = document.createElement("option");
    o.value = img.id;
    o.text = img.nombre;
    selImg.appendChild(o);
  });

  function cargarBandas(){
    let img = getImg();
    let tipo = document.getElementById("tipo").value;

    let bandas = Object.keys(img[tipo].bandas);

    let sel = document.getElementById("banda");
    sel.innerHTML = "";

    bandas.forEach(b=>{
      let o = document.createElement("option");
      o.value = b;
      o.text = b;
      sel.appendChild(o);
    });
  }

  function getImg(){
    let id = document.getElementById("imagen").value;
    return catalogo.imagenes.find(i=>i.id==id);
  }

  function update(){

    let img = getImg();
    let tipo = document.getElementById("tipo").value;
    let banda = document.getElementById("banda").value;

    map.setView([img.lat,img.lon],12);

    document.getElementById("ref").src = img.ref;

    let datos = img[tipo].bandas[banda] || {};

    document.getElementById("hex").src = datos.hex || "";
    document.getElementById("error").src = datos.error || "";

    // FIX 3D REAL
    let iframe = document.getElementById("plot");
    iframe.src = "";
    setTimeout(()=>{
      iframe.src = datos["3d"] || "";
    },100);

    actualizarStats();
  }

  function actualizarStats(){

    let tipo = document.getElementById("tipo").value;
    let stat = document.getElementById("stat_type").value;

    let base = "https://storage.googleapis.com/tesis_s2dr3/Archivos_Subida/";

    let folder = tipo === "S2"
      ? "Analisis_General_Imagenes_S2DR3vsS2"
      : "Analisis_General_Imagenes_S2DR3vsPS";

    let file = tipo === "S2"
      ? `Violinplot_Pixeles_${stat}.png`
      : `Barplot_${stat}.png`;

    document.getElementById("stats_img").src =
      base + folder + "/" + file;
  }

  // EVENTOS
  document.getElementById("imagen").onchange = ()=>{cargarBandas();update();}
  document.getElementById("tipo").onchange = ()=>{cargarBandas();update();}
  document.getElementById("banda").onchange = update;
  document.getElementById("stat_type").onchange = actualizarStats;

  // MODAL (expandir)
  document.querySelectorAll("img, iframe").forEach(el=>{
    el.onclick = ()=>{
      let modal = document.getElementById("modal");
      modal.style.display = "block";
      modal.innerHTML = el.outerHTML;
    };
  });

  document.getElementById("modal").onclick = ()=>{
    document.getElementById("modal").style.display = "none";
  };

  cargarBandas();
  update();
}

</script>

</body>
</html>

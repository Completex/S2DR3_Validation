<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interfaz de resultados</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <link rel="stylesheet" href="./style.css">
</head>

<body>
<div class="page-wrapper">

  <!-- HEADER -->
  <header class="dashboard-header">
    <h1>Interfaz de resultados</h1>

    <div class="filter-bar">
      <select id="imagen"></select>

      <select id="tipo">
        <option value="S2">S2 vs S2DR3</option>
        <option value="PS">PS vs S2DR3</option>
      </select>

      <select id="banda"></select>

      <select id="stat_type">
        <option value="R">R</option>
        <option value="R2">R2</option>
        <option value="RMSE">RMSE</option>
        <option value="MAE">MAE</option>
        <option value="umbral">Umbral</option>
      </select>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- MAPA -->
    <section>
      <h2>Mapa</h2>
      <div id="map" style="height:300px;"></div>
      <p>Lat: <span id="meta_lat">-</span></p>
      <p>Lon: <span id="meta_lon">-</span></p>
    </section>

    <!-- IMAGEN -->
    <section>
      <h2>Imagen referencia</h2>
      <img id="ref" width="300">
    </section>

    <!-- RESULTADOS -->
    <section>
      <h2>Resultados</h2>
      <img id="stats_img" width="300">
    </section>

    <!-- GRAFICOS -->
    <section>
      <h3>Hexbin</h3>
      <img id="hex" width="300">

      <h3>Error</h3>
      <img id="error" width="300">

      <h3>Plot 3D</h3>
      <iframe id="plot" width="400" height="300"></iframe>
    </section>

    <!-- TABLA -->
    <section>
      <h2>Resumen</h2>
      <div id="tabla"></div>
    </section>

  </main>
</div>

<script>

let catalogo = [];
let map;
let marker;

const selImg = document.getElementById("imagen");
const selTipo = document.getElementById("tipo");
const selBanda = document.getElementById("banda");
const selStat = document.getElementById("stat_type");

const refImg = document.getElementById("ref");
const statsImg = document.getElementById("stats_img");
const hexImg = document.getElementById("hex");
const errorImg = document.getElementById("error");
const plotFrame = document.getElementById("plot");

function initMap() {
  map = L.map('map').setView([-35, -71], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function currentScene() {
  return catalogo[Number(selImg.value)];
}

function fillImageSelect() {
  selImg.innerHTML = "";
  catalogo.forEach((scene, i) => {
    let opt = document.createElement("option");
    opt.value = i;
    opt.textContent = scene.id;
    selImg.appendChild(opt);
  });
}

function fillBandSelect() {
  const scene = currentScene();
  const type = selTipo.value;

  selBanda.innerHTML = "";

  Object.keys(scene.bands).forEach(band => {
    const bandData = scene.bands[band];

    if (bandData.comparisons && bandData.comparisons[type]) {
      let opt = document.createElement("option");
      opt.value = band;
      opt.textContent = band.replaceAll("_"," ");
      selBanda.appendChild(opt);
    }
  });
}

function currentPayload() {
  const scene = currentScene();
  const band = selBanda.value;
  const type = selTipo.value;
  const metric = selStat.value;

  const bandData = scene?.bands?.[band];
  const typeData = bandData?.comparisons?.[type];

  return { scene, band, type, metric, typeData };
}

function updateMap(scene) {
  if (!scene.metadata.lat || !scene.metadata.lon) return;

  const lat = parseFloat(scene.metadata.lat);
  const lon = parseFloat(scene.metadata.lon);

  document.getElementById("meta_lat").textContent = lat;
  document.getElementById("meta_lon").textContent = lon;

  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lon]).addTo(map);
  map.setView([lat, lon], 8);
}

function updateUI() {
  const { scene, metric, typeData } = currentPayload();
  if (!scene || !typeData) return;

  refImg.src = scene.reference_image;
  statsImg.src = typeData.metrics?.[metric] || "";
  hexImg.src = typeData.hexbin || "";
  errorImg.src = typeData.error_map || "";
  plotFrame.src = typeData.plot_3d || "";

  updateMap(scene);

  document.getElementById("tabla").innerHTML = `
    <table border="1">
      <tr><td>Escena</td><td>${scene.id}</td></tr>
      <tr><td>Fecha</td><td>${scene.metadata.date}</td></tr>
    </table>
  `;
}

function bindEvents() {
  selImg.addEventListener("change", () => {
    fillBandSelect();
    updateUI();
  });

  selTipo.addEventListener("change", () => {
    fillBandSelect();
    updateUI();
  });

  selBanda.addEventListener("change", updateUI);
  selStat.addEventListener("change", updateUI);
}

function startApp(data) {
  catalogo = data.scenes;
  initMap();
  fillImageSelect();
  fillBandSelect();
  bindEvents();
  updateUI();
}

fetch("catalogo_final.json")
  .then(r => r.json())
  .then(data => startApp(data))
  .catch(err => console.error("Error cargando catálogo:", err));

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: white;
  color: #111;
}

.header {
  padding: 10px;
  background: #f3f4f6;
  display: flex;
  gap: 10px;
  align-items: center;
}

/* 🔥 NUEVO LAYOUT */
.top {
  display: grid;
  grid-template-columns: 0.6fr 1fr 1.4fr;
  gap: 10px;
  padding: 10px;
}

.card {
  background: #f9fafb;
  border-radius: 12px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* MAPA */
#map {
  height: 260px;
}

/* IMAGEN REF */
#ref {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 10px;

  opacity: 1;
  transition: opacity 0.4s ease;
}

/* RESULTADOS */
#stats_img {
  width: 100%;
  height: 320px;
  object-fit: contain;

  opacity: 1;
  transition: opacity 0.4s ease;
}

/* GRAFICOS */
.graficos {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.graficos img, iframe {
  width: 100%;
  height: 250px;
  border-radius: 10px;
  cursor: pointer;

  opacity: 1;
  transition: opacity 0.4s ease, transform 0.25s ease;
}

.graficos img:hover {
  transform: scale(1.02);
}

/* TABLA */
#tabla {
  margin: 10px;
  max-height: 300px;
  overflow-y: auto;
}

/* MODAL CLARO */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0; top: 0;
  width: 100%; height: 100%;
  background: rgba(255,255,255,0.95);
  justify-content: center;
  align-items: center;
}

.modal-content {
  max-width: 90%;
  max-height: 90%;
}

.modal img, .modal iframe {
  width: 100%;
  height: 100%;
}

/* 🔥 ANIMACION FADE */
.fade-out {
  opacity: 0 !important;
}
</style>
</head>

<body>

<div class="header">
  <h3>Interfaz de resultados</h3>

  <select id="imagen"></select>

  <select id="tipo">
    <option value="S2">S2 vs S2DR3</option>
    <option value="PS">PS vs S2DR3</option>
  </select>

  <select id="banda"></select>
</div>

<!-- TOP -->
<div class="top">
  <div class="card"><div id="map"></div></div>

  <div class="card">
    <img id="ref">
  </div>

  <div class="card">
    <h4>Resultados Generales</h4>
    <select id="stat_type">
      <option value="R">R</option>
      <option value="R2">R2</option>
      <option value="RMSE">RMSE</option>
      <option value="MAE">MAE</option>
      <option value="umbral">Umbral</option>
    </select>
    <img id="stats_img">
  </div>
</div>

<!-- GRAFICOS -->
<div class="graficos">
  <div class="card"><img id="hex"></div>
  <div class="card"><img id="error"></div>
  <div class="card"><iframe id="plot"></iframe></div>
</div>

<div class="card" id="tabla"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modal_content"></div>
</div>

<script>

let catalogo;
let map;
let markers = [];

// 🔥 FUNCION ANIMACION
function fadeUpdate(element, newSrc){
  element.classList.add("fade-out");

  setTimeout(() => {
    element.src = newSrc || "";
    element.classList.remove("fade-out");
  }, 200);
}

// 🔥 CARGAR JSON
fetch("catalogo_final.json")
  .then(r => r.json())
  .then(data => {
    catalogo = data;
    init();
  });

function init(){

  map = L.map('map').setView([-35, -71], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);

  const selImg = document.getElementById("imagen");

  catalogo.imagenes.forEach(img => {

    let marker = L.marker([img.lat, img.lon]).addTo(map);

    markers[img.id] = marker;

    marker.on("click", () => {
      selImg.value = img.id;
      cargarBandas();
      update();
      map.flyTo([img.lat, img.lon], 12); // 🔥 animación suave
    });

    let o = document.createElement("option");
    o.value = img.id;
    o.text = img.nombre;
    selImg.appendChild(o);
  });

  function cargarBandas(){
    const id = selImg.value;
    const tipo = document.getElementById("tipo").value;

    const img = catalogo.imagenes.find(i => i.id == id);
    const bandas = Object.keys(img[tipo].bandas);

    const sel = document.getElementById("banda");
    sel.innerHTML = "";

    bandas.forEach(b => {
      let o = document.createElement("option");
      o.value = b;
      o.text = b;
      sel.appendChild(o);
    });
  }

  function cargarTabla(url, banda){
    fetch(url)
      .then(r => r.text())
      .then(text => {
        let rows = text.split("\n").map(r => r.split(","));

        let html = "<table>";

        rows.forEach((row, i) => {
          if (i === 0 || row[0] === banda){
            html += "<tr>";
            row.forEach(cell => {
              html += i === 0 ? "<th>"+cell+"</th>" : "<td>"+cell+"</td>";
            });
            html += "</tr>";
          }
        });

        html += "</table>";
        document.getElementById("tabla").innerHTML = html;
      });
  }

  function actualizarStats(){
    let tipo = document.getElementById("tipo").value;
    let stat = document.getElementById("stat_type").value;

    let url = catalogo.analisis_global[tipo].violin[stat];

    fadeUpdate(document.getElementById("stats_img"), url);
  }

  function update(){

    const id = selImg.value;
    const tipo = document.getElementById("tipo").value;
    const banda = document.getElementById("banda").value;

    const img = catalogo.imagenes.find(i => i.id == id);

    fadeUpdate(document.getElementById("ref"), img.ref);

    map.flyTo([img.lat, img.lon], 12); // 🔥 animación suave

    const datos = img[tipo].bandas[banda] || {};

    fadeUpdate(document.getElementById("hex"), datos.hex);
    fadeUpdate(document.getElementById("error"), datos.error);

    let iframe = document.getElementById("plot");
    iframe.src = datos["3d"] || "";

    iframe.onload = () => {
      try {
        iframe.contentWindow.scrollTo(0,0);
      } catch(e){}
    };

    cargarTabla(img[tipo].excel, banda);
    actualizarStats();
  }

  // EVENTOS
  selImg.onchange = () => { cargarBandas(); update(); };
  document.getElementById("tipo").onchange = () => { cargarBandas(); update(); };
  document.getElementById("banda").onchange = update;
  document.getElementById("stat_type").onchange = actualizarStats;

  // MODAL
  document.querySelectorAll("img, iframe").forEach(el => {
    el.onclick = () => {
      let modal = document.getElementById("modal");
      let content = document.getElementById("modal_content");

      if(el.tagName === "IMG"){
        content.innerHTML = `<img src="${el.src}">`;
      } else {
        content.innerHTML = `<iframe src="${el.src}"></iframe>`;
      }

      modal.style.display = "flex";
    };
  });

  document.getElementById("modal").onclick = () => {
    document.getElementById("modal").style.display = "none";
  };

  // INIT
  cargarBandas();
  update();
}

</script>

</body>
</html>

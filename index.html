<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #ffffff;
  color: #111827;
}

.header {
  padding: 15px;
  background: #e5e7eb;
  display: flex;
  gap: 10px;
  align-items: center;
}

select {
  padding: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

/* CARDS */
.card {
  background: #f3f4f6;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

/* MAPA */
#map {
  height: 300px;
}

/* IMAGEN REF */
#ref {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 10px;
}

/* GRAFICOS */
.graficos {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.graficos img, iframe {
  width: 100%;
  height: 250px;
  border-radius: 10px;
}

iframe {
  border: none;
}

/* TABLA */
#tabla {
  margin: 10px;
  max-height: 300px;
  overflow-y: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #d1d5db;
  padding: 5px;
}
</style>
</head>

<body>

<div class="header">
  <h3>🌎 Visor S2DR3</h3>

  <select id="imagen"></select>

  <select id="tipo">
    <option value="S2">S2 vs S2DR3</option>
    <option value="PS">PS vs S2DR3</option>
  </select>

  <select id="banda"></select>
</div>

<div class="container">
  <div class="card">
    <div id="map"></div>
  </div>

  <div class="card">
    <img id="ref">
  </div>
</div>

<div class="graficos">
  <div class="card"><img id="hex"></div>
  <div class="card"><img id="error"></div>
  <div class="card"><iframe id="plot"></iframe></div>
</div>

<div class="card" id="tabla"></div>

<script>

let catalogo;
let map;

// 🔥 CARGAR JSON
fetch("catalogo_final.json")
  .then(r => r.json())
  .then(data => {
    catalogo = data;
    init();
  });

// 🔥 INICIALIZAR TODO
function init() {

  map = L.map('map').setView([-35, -71], 5);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const selImg = document.getElementById("imagen");

  catalogo.imagenes.forEach(img => {

    let marker = L.marker([img.lat, img.lon]).addTo(map);
    marker.bindPopup(img.nombre);

    marker.on("click", () => {
      selImg.value = img.id;
      cargarBandas();
      update();
      map.setView([img.lat, img.lon], 12);
    });

    let o = document.createElement("option");
    o.value = img.id;
    o.text = img.nombre;
    selImg.appendChild(o);
  });

  function cargarBandas() {
    const id = selImg.value;
    const tipo = document.getElementById("tipo").value;

    const img = catalogo.imagenes.find(i => i.id == id);
    const bandas = Object.keys(img[tipo].bandas);

    const sel = document.getElementById("banda");
    sel.innerHTML = "";

    bandas.forEach(b => {
      let o = document.createElement("option");
      o.value = b;
      o.text = b;
      sel.appendChild(o);
    });
  }

  function cargarTabla(url, banda) {
    fetch(url)
      .then(r => r.text())
      .then(text => {
        let rows = text.split("\n").map(r => r.split(","));

        let html = "<table>";

        rows.forEach((row, i) => {
          if (i === 0 || row[0] === banda) {
            html += "<tr>";
            row.forEach(cell => {
              html += i === 0 ? "<th>"+cell+"</th>" : "<td>"+cell+"</td>";
            });
            html += "</tr>";
          }
        });

        html += "</table>";

        document.getElementById("tabla").innerHTML = html;
      });
  }

  function update() {
    const id = selImg.value;
    const tipo = document.getElementById("tipo").value;
    const banda = document.getElementById("banda").value;

    const img = catalogo.imagenes.find(i => i.id == id);

    // 🔥 MOVER MAPA AUTOMATICAMENTE
    map.setView([img.lat, img.lon], 12);

    document.getElementById("ref").src = img.ref;

    const datos = img[tipo].bandas[banda] || {};

    document.getElementById("hex").src = datos.hex || "";
    document.getElementById("error").src = datos.error || "";

    // 🔥 FIX IFRAME 3D
    const iframe = document.getElementById("plot");
    iframe.src = "";
    setTimeout(() => {
      iframe.src = datos["3d"] || "";
    }, 50);

    cargarTabla(img[tipo].excel, banda);
  }

  // EVENTOS
  selImg.onchange = () => { cargarBandas(); update(); };
  document.getElementById("tipo").onchange = () => { cargarBandas(); update(); };
  document.getElementById("banda").onchange = update;

  // INIT
  cargarBandas();
  update();
}

</script>

</body>
</html>
